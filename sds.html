<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cycle Wala Sales Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
  --primary: #f97316;
  --primary-hover: #ea580c;
  --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  --card-bg: rgba(255, 255, 255, 0.05);
  --glass: rgba(255, 255, 255, 0.03);
  --text-main: #f8fafc;
  --text-muted: #94a3b8;
  --radius: 16px;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg-gradient);
  background-attachment: fixed;
  color: var(--text-main);
  min-height: 100vh;
  padding: 15px;
}

/* HEADER SECTION */
header {
  text-align: center;
  padding: 30px 0;
  animation: fadeInDown 0.8s ease-out;
}

h1 {
  font-family: 'Poppins', sans-serif;
  font-size: clamp(1.5rem, 5vw, 2.5rem);
  margin: 0;
  letter-spacing: -1px;
  background: linear-gradient(to right, #fff, #f97316);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

header p {
  color: var(--text-muted);
  margin-top: 8px;
  font-size: 0.9rem;
}

/* CARDS GRID */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 15px;
  max-width: 1200px;
  margin: 0 auto 30px;
}

.card {
  background: var(--card-bg);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: var(--radius);
  position: relative;
  transition: all 0.3s ease;
  animation: fadeInUp 0.6s ease-out both;
}

.card:hover {
  transform: translateY(-5px);
  background: rgba(255,255,255,0.08);
  border-color: var(--primary);
}

.card i {
  position: absolute;
  right: 20px;
  top: 20px;
  font-size: 1.2rem;
  color: var(--primary);
}

.card h3 {
  color: var(--text-muted);
  font-size: 0.75rem;
  text-transform: uppercase;
  margin: 0;
}

.card h2 {
  margin: 10px 0 0;
  font-size: clamp(1.4rem, 4vw, 1.8rem);
  font-weight: 700;
}

/* CONTROLS AREA */
.controls {
  max-width: 1200px;
  margin: 0 auto 30px;
  background: var(--glass);
  padding: 20px;
  border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,0.05);
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.control-group {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  justify-content: center;
}

.input-box {
  flex: 1;
  min-width: 140px;
}

input[type="date"] {
  width: 100%;
  background: #0f172a;
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  padding: 12px;
  border-radius: 10px;
  outline: none;
}

button {
  padding: 12px 20px;
  border-radius: 10px;
  border: none;
  background: var(--primary);
  color: white;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: 0.2s;
  white-space: nowrap;
}

button:active { transform: scale(0.95); }

/* DATA TABLE BOX */
#dataBox {
  background: var(--glass);
  border-radius: var(--radius);
  padding: 20px;
  margin: 0 auto;
  max-width: 1200px;
  border: 1px solid rgba(255,255,255,0.05);
  overflow-x: auto; /* For mobile scroll */
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 500px; /* Ensures table doesn't squash on mobile */
}

th {
  color: var(--text-muted);
  font-size: 0.75rem;
  text-transform: uppercase;
  padding: 12px;
  text-align: left;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

td {
  padding: 15px 12px;
  font-size: 0.9rem;
  border-bottom: 1px solid rgba(255,255,255,0.02);
}

.total-display {
  text-align: right;
  font-size: 1.3rem;
  margin-top: 20px;
  font-weight: 700;
  color: var(--primary);
}

/* RESPONSIVE BREAKPOINTS */
@media (min-width: 768px) {
  .controls {
    flex-direction: row;
    justify-content: space-between;
  }
  .divider {
    width: 1px;
    height: 40px;
    background: rgba(255,255,255,0.1);
  }
}

@media (max-width: 480px) {
  .cards { grid-template-columns: 1fr; }
  .control-group { width: 100%; }
  button { width: 100%; }
  body { padding: 10px; }
}

@keyframes fadeInUp { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeInDown { from { opacity:0; transform:translateY(-15px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>

<header>
  <h1><i class="fa-solid fa-chart-line"></i> Cycle Wala Sales Insight</h1>
  <p>Real-time analytics & transaction monitoring</p>
</header>

<div class="cards">
  <div class="card">
    <i class="fa-solid fa-calendar-day"></i>
    <h3>Today</h3>
    <h2 id="today">₹0</h2>
  </div>
  <div class="card">
    <i class="fa-solid fa-calendar-check"></i>
    <h3>Yesterday</h3>
    <h2 id="yesterday">₹0</h2>
  </div>
  <div class="card">
    <i class="fa-solid fa-calendar-week"></i>
    <h3>This Week</h3>
    <h2 id="week">₹0</h2>
  </div>
  <div class="card">
    <i class="fa-solid fa-calendar-days"></i>
    <h3>This Month</h3>
    <h2 id="month">₹0</h2>
  </div>
</div>

<div class="controls">
  <div class="control-group">
    <div class="input-box"><input type="date" id="dateInput"></div>
    <button onclick="filterData()"><i class="fa-solid fa-magnifying-glass"></i> Filter</button>
  </div>

  <div class="divider"></div>

  <div class="control-group">
    <div class="input-box"><input type="date" id="fromDate"></div>
    <span style="color: var(--text-muted)">to</span>
    <div class="input-box"><input type="date" id="toDate"></div>
    <button onclick="filterRange()"><i class="fa-solid fa-filter"></i> Run Range</button>
  </div>
</div>

<div id="dataBox">
  <div style="text-align: center; padding: 40px; color: var(--text-muted);">
    <i class="fa-solid fa-database" style="font-size: 2.5rem; margin-bottom: 15px; opacity: 0.2;"></i>
    <h3>Select dates to view report</h3>
  </div>
</div>

<script>
const SHEET_URL = "https://opensheet.elk.sh/1QkJkOSir4IO8PABtPLMnd4gDalTLYJT0yyDciNXFZLE/Sheet1";
let allData = [];

async function loadData() {
  try {
    const res = await fetch(SHEET_URL);
    allData = await res.json();
    calculate();
  } catch (e) { console.error("Fetch failed", e); }
}

function formatDate(str) {
  let p = str.trim().split("/");
  return `${p[2]}-${p[1].padStart(2,"0")}-${p[0].padStart(2,"0")}`;
}

function calculate() {
  let now = new Date();
  let todayStr = now.toISOString().split('T')[0];
  
  let yesterday = new Date(now);
  yesterday.setDate(now.getDate() - 1);
  let yesterdayStr = yesterday.toISOString().split('T')[0];

  let day = now.getDay();
  let diff = (day === 0 ? -6 : 1 - day);
  let weekStart = new Date(now);
  weekStart.setDate(now.getDate() + diff);
  weekStart.setHours(0,0,0,0);

  let monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

  let t=0, y=0, w=0, m=0;

  allData.forEach(r => {
    let dStr = formatDate(r.Date);
    let dDate = new Date(dStr);
    let val = parseFloat(r["Grand Total"] || 0);

    if (dStr === todayStr) t += val;
    if (dStr === yesterdayStr) y += val;
    if (dDate >= weekStart && dDate <= now) w += val;
    if (dDate >= monthStart && dDate <= now) m += val;
  });

  document.getElementById("today").innerText = "₹" + t.toLocaleString('en-IN');
  document.getElementById("yesterday").innerText = "₹" + y.toLocaleString('en-IN');
  document.getElementById("week").innerText = "₹" + w.toLocaleString('en-IN');
  document.getElementById("month").innerText = "₹" + m.toLocaleString('en-IN');
}

function generateTable(data){
  if(data.length === 0) return "<p style='text-align:center; padding:20px;'>No records found.</p>";
  
  let total=0;
  let html=`<table><thead><tr><th>Date</th><th>Customer</th><th>Product</th><th>Amount</th></tr></thead><tbody>`;

  data.forEach(r=>{
    let amt = parseFloat(r["Grand Total"]||0);
    total += amt;
    html += `<tr><td>${r.Date}</td><td>${r["Customer Name"]}</td><td>${r.Product}</td><td>₹${amt.toLocaleString('en-IN')}</td></tr>`;
  });

  html += `</tbody></table><div class="total-display">Grand Total: ₹${total.toLocaleString('en-IN')}</div>`;
  return html;
}

function filterData(){
  let selected = document.getElementById("dateInput").value;
  if(!selected) return;
  let filtered = allData.filter(r => formatDate(r.Date) === selected);
  document.getElementById("dataBox").innerHTML = `<h3>Report: ${selected}</h3>` + generateTable(filtered);
}

function filterRange(){
  let from = document.getElementById("fromDate").value;
  let to = document.getElementById("toDate").value;
  if(!from || !to) return;
  let filtered = allData.filter(r => {
    let d = formatDate(r.Date);
    return d >= from && d <= to;
  });
  document.getElementById("dataBox").innerHTML = `<h3>Range: ${from} to ${to}</h3>` + generateTable(filtered);
}

loadData();
setInterval(loadData, 5000); // 5 sec refresh is better for performance
</script>

</body>
</html>
