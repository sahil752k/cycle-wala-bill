<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyclewala Invoice</title>

<style>
:root { --orange: #f38118; --black: #1a1a1a; }

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    -webkit-print-color-adjust:exact !important;
    print-color-adjust:exact !important;
}

body{
    font-family:Arial,sans-serif;
    background:#444;
    color:#333;
}

.no-print{
    max-width:900px;
    margin:15px auto;
    background:white;
    padding:20px;
    border-radius:12px;
    border:2px solid var(--orange);
}

.input-row{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:10px;
}

.input-row input{
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
    flex:1 1 200px;
}

.btn-main{
    background:var(--orange);
    color:white;
    border:none;
    padding:10px;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

.action-btns{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.btn-print,.btn-whatsapp{
    flex:1;
    padding:12px;
    border:none;
    border-radius:6px;
    font-weight:bold;
    color:white;
    cursor:pointer;
}

.btn-print{background:var(--black);}
.btn-whatsapp{background:#25D366;}

#bill-wrapper{
    width:100%;
    overflow-x:auto;
}

#bill-canvas{
    width:210mm;
    min-height:297mm;
    background:white;
    margin:0 auto;
    padding:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

thead th{
    background:var(--orange);
    color:white;
    padding:8px;
    font-size:13px;
}

tbody td{
    padding:8px;
    border-bottom:1px solid #ddd;
    font-size:14px;
}

.calc-wrapper{
    display:flex;
    justify-content:flex-end;
    margin-top:15px;
}

.calc-table{
    width:250px;
}

.calc-row{
    display:flex;
    justify-content:space-between;
    padding:4px 0;
}

.grand-total-row{
    font-size:20px;
    font-weight:bold;
    color:var(--orange);
}

@media print{
    .no-print{display:none;}
    body{background:none;}
}
</style>
</head>
<body>

<div class="no-print">
<h2 style="text-align:center;color:var(--orange);margin-bottom:10px;">Cyclewala Billing</h2>

<div class="input-row">
<input type="text" id="cName" placeholder="Customer Name" oninput="sync()">
<input type="number" id="cPhone" placeholder="WhatsApp Number" oninput="sync()">
</div>

<div class="input-row">
<input type="text" id="iName" placeholder="Product Name">
<input type="number" id="iQty" placeholder="Qty">
<input type="number" id="iRate" placeholder="Rate">
<button class="btn-main" onclick="addItem()">+ ADD PRODUCT</button>
</div>

<div class="action-btns">
<button class="btn-print" onclick="generatePDF()">PRINT</button>
<button class="btn-whatsapp" onclick="sendWhatsApp()">WHATSAPP</button>
</div>
</div>

<div id="bill-wrapper">
<div id="bill-canvas">

<h3>Invoice No: <span id="invNo"></span></h3>
<p>Date: <span id="dispDate"></span></p>
<p><strong>Customer:</strong> <span id="dispName">Customer Name</span></p>
<p id="dispPhone"></p>

<br>

<table>
<thead>
<tr>
<th>Sr</th>
<th>Description</th>
<th>Qty</th>
<th>Rate</th>
<th>Amount</th>
</tr>
</thead>
<tbody id="billBody"></tbody>
</table>

<div class="calc-wrapper">
<div class="calc-table">
<div class="calc-row"><span>Subtotal</span><span id="subT">₹0</span></div>
<div class="calc-row"><span>CGST (2.5%)</span><span id="cgstT">₹0</span></div>
<div class="calc-row"><span>SGST (2.5%)</span><span id="sgstT">₹0</span></div>
<div class="calc-row grand-total-row"><span>Total</span><span id="grandT">₹0</span></div>
</div>
</div>

</div>
</div>

<script>
let items = [];
let billSaved = false;

const SHEET_URL = "https://script.google.com/macros/s/AKfycbx3j_duZRiu12r0vHtDKgkMKkZaIdkuqR7hqUScozdmbqLWdsh2KLvXfQBwZzi9s7m1iA/exec";

// 🔥 Invoice backend se lo
window.onload = function(){
fetch(SHEET_URL)
.then(res=>res.text())
.then(inv=>{
document.getElementById("invNo").innerText = inv;
});
document.getElementById("dispDate").innerText =
new Date().toLocaleDateString("en-GB");
};

function addItem(){
const n=document.getElementById("iName").value;
const q=parseFloat(document.getElementById("iQty").value);
const r=parseFloat(document.getElementById("iRate").value);

if(!n||isNaN(q)||isNaN(r)){
alert("Fill all fields");
return;
}

items.push({n,q,r,a:q*r});
render();

document.getElementById("iName").value="";
document.getElementById("iQty").value="";
document.getElementById("iRate").value="";
}

function sync(){
document.getElementById("dispName").innerText =
document.getElementById("cName").value||"Customer Name";

document.getElementById("dispPhone").innerText =
"Phone: "+(document.getElementById("cPhone").value||"");
}

function render(){
let html="",sub=0;

items.forEach((it,i)=>{
sub+=it.a;
html+=`<tr>
<td>${i+1}</td>
<td>${it.n}</td>
<td>${it.q}</td>
<td>₹${it.r}</td>
<td>₹${it.a}</td>
</tr>`;
});

document.getElementById("billBody").innerHTML=html;

let cgst=sub*0.025;
let sgst=sub*0.025;
let total=sub+cgst+sgst;

document.getElementById("subT").innerText="₹"+sub;
document.getElementById("cgstT").innerText="₹"+cgst.toFixed(2);
document.getElementById("sgstT").innerText="₹"+sgst.toFixed(2);
document.getElementById("grandT").innerText="₹"+Math.round(total);
}

function saveToSheet(){

if(billSaved) return;

const data={
invoice:document.getElementById("invNo").innerText,
date:document.getElementById("dispDate").innerText,
name:document.getElementById("cName").value,
phone:document.getElementById("cPhone").value,
items:items
};

fetch(SHEET_URL,{
method:"POST",
body:JSON.stringify(data)
});

billSaved=true;
}

function generatePDF(){
saveToSheet();
window.print();
}

function sendWhatsApp(){
saveToSheet();

const phone=document.getElementById("cPhone").value;
if(!phone){alert("Enter WhatsApp number");return;}

const name=document.getElementById("cName").value||"Customer";
const inv=document.getElementById("invNo").innerText;
const total=document.getElementById("grandT").innerText;

const msg=`Hello ${name}, Invoice #${inv}, Total: ${total}`;
window.open(`https://wa.me/${phone}?text=${msg}`,"_blank");
}
</script>

</body>
</html>
