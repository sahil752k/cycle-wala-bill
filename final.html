<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Cyclewala - Final A4 Invoice</title>
    <style>
        :root { --orange: #f38118; --black: #1a1a1a; }
        
        * { 
            -webkit-print-color-adjust: exact !important; 
            print-color-adjust: exact !important; 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0;
        }

        @page { size: A4; margin: 0; }

        body { font-family: 'Arial', sans-serif; background: #444; }

        .no-print { 
            max-width: 800px; margin: 20px auto; background: white; 
            padding: 20px; border-radius: 8px; border: 2px solid var(--orange); 
        }
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; flex: 1; }
        .btn-main { background: var(--orange); color: white; border: none; padding: 10px 25px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        
        /* New Buttons Layout */
        .action-btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn-print { flex: 1; background: var(--black); color: white; padding: 15px; font-size: 16px; border: none; cursor: pointer; border-radius: 4px; }
        .btn-whatsapp { flex: 1; background: #25D366; color: white; padding: 15px; font-size: 16px; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }

        #bill-canvas { 
            width: 210mm; 
            min-height: 297mm; 
            background-color: white;
            background-image: url('./texture.png'); 
            background-size: cover; 
            margin: auto; 
            position: relative; 
            display: flex;
            flex-direction: column;
        }

        .bill-header-img { width: 100%; display: block; border: none; }
        
        .bill-footer-wrapper { margin-top: auto; width: 100%; }
        .bill-footer-img { width: 100%; display: block; }

        .bill-content { flex: 1; padding: 5mm 15mm; z-index: 1; }

        .info-section { display: flex; justify-content: space-between; margin-top: -55px; margin-bottom: 10px; }
        .info-box { flex: 1; text-align: left; margin-top: 35px; }
        .infro-box { flex: 1; text-align: right; margin-top: 5px; }

        .info-box p, .infro-box p { margin: 1px 0; font-size: 16px; color: #333; line-height: 1.4; }
        .bill-line { width: 180px; margin-left: auto; margin-top: 5px; border: 0.5px solid #ccc; }

        .shop-title-bar { background:#333; color: var(--orange); text-align: center; padding: 8px; font-weight: bold; font-size: 24px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 0px; }

        table { width: 100%; border-collapse: collapse; background: rgba(255, 255, 255, 0.6); }
        thead th { background: var(--orange); color: white; padding: 10px; text-align: left; text-transform: uppercase; font-size: 12px; }
        tbody td { padding: 10px; border-bottom: 1px solid #ddd; font-size: 14px; color: #000; }
        .row-alt { background: rgba(243, 129, 24, 0.05); }

        .calc-wrapper { display: flex; justify-content: flex-end; margin-top: 15px; margin-bottom: 20px;}
        .calc-table { width: 280px; }
        .calc-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 16px; }
        .grand-total-row { margin-top: 10px; font-size: 28px; font-weight: 900; color: var(--orange); border-top: 2px solid #000; padding-top: 5px; }

        @media print {
            body { background: none; }
            .no-print { display: none; }
            #bill-canvas { width: 210mm; min-height: 297mm; box-shadow: none; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <h2 style="color: var(--orange); margin-bottom: 15px;">Cyclewala Billing System</h2>
    <div class="input-row">
        <input type="text" id="cName" placeholder="Customer Name" oninput="sync()">
        <input type="text" id="cPhone" placeholder="WhatsApp Number (e.g. 9173855...)" oninput="sync()">
    </div>
    <div class="input-row">
        <input type="text" id="iName" placeholder="Product Name">
        <input type="number" id="iQty" placeholder="Qty">
        <input type="number" id="iRate" placeholder="Rate">
        <button class="btn-main" onclick="addItem()">+ Add Item</button>
    </div>
    
    <div class="action-btns">
        <button class="btn-print" onclick="window.print()">PRINT FULL A4 BILL</button>
        <button class="btn-whatsapp" onclick="sendWhatsApp()">
            <span>SEND WHATSAPP</span>
        </button>
    </div>
</div>

<div id="bill-canvas">
    <img src="./fheader.png" class="bill-header-img" alt="Header">

    <div class="bill-content">
        <div class="info-section">
            <div class="info-box">
                <p><strong>123 Main Street</strong></p>
                <p>City, State, ZIP Code</p>
                <p>+91 98643 22260</p>
                <p>info@cyclewala.com</p>
            </div>
            <div class="infro-box">
                <p><strong>Invoice No: </strong> <span id="invNo"></span></p>
                <p><strong>Date: </strong> <span id="dispDate"></span></p>
                <hr class="bill-line">
                <p style="margin-top:8px"><strong>To:</strong> <span id="dispName">Customer Name</span></p>
                <p id="dispPhone">Phone: 7385590822</p>
            </div>
        </div>

        <div class="shop-title-bar">COMPLETE BICYCLE STORE</div>

        <table>
            <thead>
                <tr>
                    <th style="width:60px">Sr.</th>
                    <th>Description</th>
                    <th style="width:60px">Qty</th>
                    <th>Rate</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody id="billBody"></tbody>
        </table>

        <div class="calc-wrapper">
            <div class="calc-table">
                <div class="calc-row"><span>SUBTOTAL</span> <span id="subT">₹0</span></div>
                <div class="calc-row"><span>CGST (2.5%)</span> <span id="cgstT">₹0.00</span></div>
                <div class="calc-row"><span>SGST (2.5%)</span> <span id="sgstT">₹0.00</span></div>
                <div class="calc-row grand-total-row"><span>Total</span> <span id="grandT">₹0</span></div>
            </div>
        </div>
    </div>

    <div class="bill-footer-wrapper">
        <img src="./ffui.png" class="bill-footer-img" alt="Footer">
    </div>
</div>

<script>
    let items = [];
    
    window.onload = function() {
        const randomBillNo = Math.floor(100000 + Math.random() * 900000);
        document.getElementById('invNo').innerText = randomBillNo;
        document.getElementById('dispDate').innerText = new Date().toLocaleDateString('en-GB');
    };

    function addItem() {
        const n = document.getElementById('iName').value;
        const q = parseFloat(document.getElementById('iQty').value);
        const r = parseFloat(document.getElementById('iRate').value);
        if (!n || isNaN(q) || isNaN(r)) return;
        items.push({ n, q, r, a: q * r });
        render();
        document.getElementById('iName').value = '';
        document.getElementById('iQty').value = '';
        document.getElementById('iRate').value = '';
    }

    function sync() {
        document.getElementById('dispName').innerText = document.getElementById('cName').value || "Customer Name";
        document.getElementById('dispPhone').innerText = "Phone: " + (document.getElementById('cPhone').value || "7385590822");
    }

    function render() {
        let html = '', sub = 0;
        items.forEach((it, i) => {
            sub += it.a;
            html += `<tr class="${i % 2 != 0 ? 'row-alt' : ''}">
                <td>${i + 1}</td><td>${it.n}</td><td>${it.q}</td>
                <td>₹${it.r.toLocaleString('en-IN')}</td><td>₹${it.a.toLocaleString('en-IN')}</td>
            </tr>`;
        });
        document.getElementById('billBody').innerHTML = html;
        
        let cgst = sub * 0.025;
        let sgst = sub * 0.025;
        let total = sub + cgst + sgst;

        document.getElementById('subT').innerText = "₹" + sub.toLocaleString('en-IN');
        document.getElementById('cgstT').innerText = "₹" + cgst.toLocaleString('en-IN', {minimumFractionDigits: 2});
        document.getElementById('sgstT').innerText = "₹" + sgst.toLocaleString('en-IN', {minimumFractionDigits: 2});
        document.getElementById('grandT').innerText = "₹" + Math.round(total).toLocaleString('en-IN');
    }

    function sendWhatsApp() {
        const phone = document.getElementById('cPhone').value;
        const name = document.getElementById('cName').value || "Customer";
        const invNo = document.getElementById('invNo').innerText;
        const total = document.getElementById('grandT').innerText;
        const date = document.getElementById('dispDate').innerText;

        if(!phone) {
            alert("कृपया कस्टमर का WhatsApp नंबर दर्ज करें!");
            return;
        }

        // Build product list message
        let productList = "";
        items.forEach((it, i) => {
            productList += `${i+1}. ${it.n} (Qty: ${it.q}) - ₹${it.a.toLocaleString('en-IN')}%0A`;
        });

        const msg = `नमस्ते ${name},%0A%0A*Cyclewala* से खरीदारी करने के लिए धन्यवाद!%0A%0A*Invoice Details:*%0A--------------------%0AInvoice No: ${invNo}%0ADate: ${date}%0A%0A*Items:*%0A${productList}%0A*Grand Total: ${total}*%0A%0Aकृपया इस मैसेज के साथ भेजा गया PDF बिल डाउनलोड करें।`;

        // Redirect to WhatsApp
        window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');

        // Trigger PDF Download (Print)
        setTimeout(() => {
            window.print();
        }, 1000);
    }
</script>
</body>
</html>
