<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cycle Wala Sales Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
  --primary: #f97316;
  --primary-hover: #ea580c;
  --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  --card-bg: rgba(255, 255, 255, 0.05);
  --glass: rgba(255, 255, 255, 0.03);
  --text-main: #f8fafc;
  --text-muted: #94a3b8;
  --radius: 16px;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg-gradient);
  background-attachment: fixed;
  color: var(--text-main);
  min-height: 100vh;
  padding: 20px;
}

/* HEADER SECTION */
header {
  text-align: center;
  padding: 40px 0;
  animation: fadeInDown 0.8s ease-out;
}

h1 {
  font-family: 'Poppins', sans-serif;
  font-size: 2.5rem;
  margin: 0;
  letter-spacing: -1px;
  background: linear-gradient(to right, #fff, #f97316);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

header p {
  color: var(--text-muted);
  margin-top: 10px;
}

/* CARDS GRID */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 25px;
  max-width: 1200px;
  margin: 0 auto 40px;
}

.card {
  background: var(--card-bg);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 25px;
  border-radius: var(--radius);
  position: relative;
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  animation: fadeInUp 0.6s ease-out both;
}

.card:hover {
  transform: translateY(-10px);
  background: rgba(255,255,255,0.08);
  border-color: var(--primary);
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.card i {
  position: absolute;
  right: 20px;
  top: 20px;
  font-size: 1.5rem;
  color: var(--primary);
  opacity: 0.8;
}

.card h3 {
  color: var(--text-muted);
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin: 0;
}

.card h2 {
  margin: 15px 0 0;
  font-size: 1.8rem;
  font-weight: 700;
  color: #fff;
}

/* CONTROLS AREA */
.controls {
  max-width: 1200px;
  margin: 0 auto 40px;
  background: var(--glass);
  padding: 30px;
  border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,0.05);
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  align-items: center;
}

input[type="date"] {
  background: #0f172a;
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  padding: 12px 15px;
  border-radius: 10px;
  outline: none;
  font-family: inherit;
  transition: 0.3s;
}

input[type="date"]:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.2);
}

button {
  padding: 12px 25px;
  border-radius: 10px;
  border: none;
  background: var(--primary);
  color: white;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: 0.3s;
}

button:hover {
  background: var(--primary-hover);
  transform: scale(1.02);
}

/* DATA TABLE BOX */
#dataBox {
  background: var(--glass);
  backdrop-filter: blur(20px);
  border-radius: var(--radius);
  padding: 30px;
  margin: 0 auto;
  max-width: 1200px;
  border: 1px solid rgba(255,255,255,0.05);
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
  min-height: 200px;
}

#dataBox h3 {
  text-align: left;
  margin-top: 0;
  font-weight: 500;
  color: var(--text-muted);
}

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0 8px;
  margin-top: 20px;
}

th {
  background: transparent;
  color: var(--text-muted);
  font-weight: 500;
  text-transform: uppercase;
  font-size: 0.75rem;
  letter-spacing: 1px;
  padding: 15px;
  text-align: left;
}

td {
  background: rgba(255,255,255,0.02);
  padding: 16px;
  font-size: 0.95rem;
}

td:first-child { border-radius: 12px 0 0 12px; }
td:last-child { border-radius: 0 12px 12px 0; border-left: none; text-align: right; font-weight: 600;}

tr:hover td {
  background: rgba(255,255,255,0.05);
  color: var(--primary);
}

.total-display {
  text-align: right;
  font-size: 1.5rem;
  margin-top: 30px;
  font-weight: 700;
  color: var(--primary);
  border-top: 1px solid rgba(255,255,255,0.1);
  padding-top: 20px;
}

/* ANIMATIONS */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* MOBILE OPTIMIZATION */
@media(max-width:768px){
  .cards { grid-template-columns: 1fr 1fr; }
  .controls { flex-direction: column; }
  input, button { width: 100%; }
}
</style>
</head>

<body>

<header>
  <h1><i class="fa-solid fa-chart-line"></i> Cycle Wala Sales Insight</h1>
  <p>Real-time analytics & transaction monitoring</p>
</header>

<div class="cards">
  <div class="card" style="animation-delay: 0.1s">
    <i class="fa-solid fa-calendar-day"></i>
    <h3>Today</h3>
    <h2 id="today">₹0</h2>
  </div>
  <div class="card" style="animation-delay: 0.2s">
    <i class="fa-solid fa-calendar-check"></i>
    <h3>Yesterday</h3>
    <h2 id="yesterday">₹0</h2>
  </div>
  <div class="card" style="animation-delay: 0.3s">
    <i class="fa-solid fa-calendar-week"></i>
    <h3>This Week</h3>
    <h2 id="week">₹0</h2>
  </div>
  <div class="card" style="animation-delay: 0.4s">
    <i class="fa-solid fa-calendar-days"></i>
    <h3>This Month</h3>
    <h2 id="month">₹0</h2>
  </div>
</div>

<div class="controls">
  <div style="display: flex; gap: 10px; align-items: center;">
    <input type="date" id="dateInput">
    <button onclick="filterData()"><i class="fa-solid fa-magnifying-glass"></i> Filter</button>
  </div>

  <div style="width: 2px; height: 30px; background: rgba(255,255,255,0.1); margin: 0 10px;" class="desktop-only"></div>

  <div style="display: flex; gap: 10px; align-items: center;">
    <input type="date" id="fromDate">
    <span style="color: var(--text-muted)">to</span>
    <input type="date" id="toDate">
    <button onclick="filterRange()"><i class="fa-solid fa-filter"></i> Run Range</button>
  </div>
</div>

<div id="dataBox">
  <div style="text-align: center; padding: 40px; color: var(--text-muted);">
    <i class="fa-solid fa-database" style="font-size: 3rem; margin-bottom: 20px; opacity: 0.2;"></i>
    <h3>Please select a date or range to view report</h3>
  </div>
</div>

<script>
// Logic remains identical to your original request
const SHEET_URL = "https://opensheet.elk.sh/1QkJkOSir4IO8PABtPLMnd4gDalTLYJT0yyDciNXFZLE/Sheet1";
let allData = [];

async function loadData() {
  try {
    const res = await fetch(SHEET_URL);
    allData = await res.json();
    calculate();
  } catch (e) {
    console.error("Data fetch failed", e);
  }
}

function formatDate(str) {
  let p = str.trim().split("/");
  return `${p[2]}-${p[1].padStart(2,"0")}-${p[0].padStart(2,"0")}`;
}

function calculate() {
  let now = new Date();
  let todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let yesterdayStart = new Date(todayStart);
  yesterdayStart.setDate(todayStart.getDate() - 1);

  let day = now.getDay();
  let diff = (day === 0 ? -6 : 1 - day);
  let weekStart = new Date(now);
  weekStart.setDate(now.getDate() + diff);
  weekStart.setHours(0,0,0,0);

  let monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

  let t=0,y=0,w=0,m=0;

  allData.forEach(r=>{
    let d = new Date(formatDate(r.Date));
    let val = parseFloat(r["Grand Total"]||0);

    if (d.toDateString()===todayStart.toDateString()) t+=val;
    if (d.toDateString()===yesterdayStart.toDateString()) y+=val;
    if (d>=weekStart && d<=now) w+=val;
    if (d>=monthStart && d<=now) m+=val;
  });

  document.getElementById("today").innerText = "₹" + t.toLocaleString('en-IN');
  document.getElementById("yesterday").innerText = "₹" + y.toLocaleString('en-IN');
  document.getElementById("week").innerText = "₹" + w.toLocaleString('en-IN');
  document.getElementById("month").innerText = "₹" + m.toLocaleString('en-IN');
}

function generateTable(data){
  if(data.length === 0) return "<p style='text-align:center; padding:20px;'>No records found for this selection.</p>";
  
  let total=0;
  let html=`
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Customer</th>
        <th>Product</th>
        <th>Amount</th>
      </tr>
    </thead>
    <tbody>`;

  data.forEach(r=>{
    let amt=parseFloat(r["Grand Total"]||0);
    total+=amt;
    html+=`
    <tr>
      <td>${r.Date}</td>
      <td>${r["Customer Name"]}</td>
      <td>${r.Product}</td>
      <td>₹${amt.toLocaleString('en-IN')}</td>
    </tr>`;
  });

  html+=`</tbody></table><div class="total-display">Grand Total: ₹${total.toLocaleString('en-IN')}</div>`;
  return html;
}

function filterData(){
  let selected=document.getElementById("dateInput").value;
  if(!selected){ alert("Please select a date"); return; }

  let filtered=allData.filter(r=>formatDate(r.Date)===selected);
  document.getElementById("dataBox").innerHTML = 
    "<h3><i class='fa-solid fa-calendar-day'></i> Report for " + selected + "</h3>" + generateTable(filtered);
}

function filterRange(){
  let from=document.getElementById("fromDate").value;
  let to=document.getElementById("toDate").value;
  if(!from || !to){ alert("Please select both dates"); return; }

  let filtered=allData.filter(r=>{
    let d=formatDate(r.Date);
    return d>=from && d<=to;
  });

  document.getElementById("dataBox").innerHTML = 
    "<h3><i class='fa-solid fa-calendar-range'></i> Range: " + from + " to " + to + "</h3>" + generateTable(filtered);
}

loadData();
setInterval(loadData, 1000);
</script>

</body>
</html>
