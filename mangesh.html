<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyclewala - Premium Responsive Invoice</title>
    <style>
        :root { --orange: #f38118; --black: #1a1a1a; }
        
        * { 
            -webkit-print-color-adjust: exact !important; 
            print-color-adjust: exact !important; 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0;
        }

        @page { size: A4; margin: 0; }

        body { font-family: 'Arial', sans-serif; background: #444; color: #333; }

        /* ✅ RESPONSIVE INPUT PANEL */
        .no-print { 
            max-width: 900px; 
            margin: 15px auto; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            border: 2px solid var(--orange); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .input-row { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 12px; 
            margin-bottom: 12px; 
        }

        .input-row input { 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            flex: 1 1 200px; /* मोबाइल पर अपने आप जगह लेगा */
            font-size: 14px;
        }

        .btn-main { 
            background: var(--orange); 
            color: white; 
            border: none; 
            padding: 12px 25px; 
            cursor: pointer; 
            font-weight: bold; 
            border-radius: 6px; 
            flex: 1 1 100%; /* मोबाइल पर फुल विड्थ */
            font-size: 16px;
        }

        .action-btns { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            margin-top: 15px; 
        }

        .btn-print, .btn-whatsapp { 
            flex: 1 1 180px; 
            padding: 15px; 
            font-size: 15px; 
            border: none; 
            cursor: pointer; 
            border-radius: 6px; 
            font-weight: bold;
            color: white;
            text-align: center;
        }

        .btn-print { background: var(--black); }
        .btn-whatsapp { background: #25D366; }

        /* ✅ BILL CANVAS (Desktop Preview) */
        #bill-wrapper {
            width: 100%;
            overflow-x: auto; /* मोबाइल पर बिल कटने से बचाएगा */
            padding-bottom: 50px;
        }

        #bill-canvas { 
            width: 210mm; 
            min-height: 297mm; 
            background-color: white;
            background-image: url('./texture.png'); 
            background-size: cover; 
            margin: 0 auto; 
            position: relative; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .bill-header-img { width: 100%; display: block; }
        .bill-footer-wrapper { margin-top: auto; width: 100%; }
        .bill-footer-img { width: 100%; display: block; }

        .bill-content { flex: 1; padding: 5mm 15mm; z-index: 1; }

        /* Info Section Adjustments */
        .info-section { display: flex; justify-content: space-between; margin-top: -55px; margin-bottom: 10px; }
        .info-box { flex: 1; text-align: left; margin-top: 35px; }
        .infro-box { flex: 1; text-align: right; margin-top: 5px; }

        .info-box p, .infro-box p { margin: 1px 0; font-size: 15px; color: #333; line-height: 1.4; }
        .bill-line { width: 180px; margin-left: auto; margin-top: 5px; border: 0.5px solid #ccc; }

        .shop-title-bar { background:#333; color: var(--orange); text-align: center; padding: 8px; font-weight: bold; font-size: 22px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }

        table { width: 100%; border-collapse: collapse; background: rgba(255, 255, 255, 0.7); }
        thead th { background: var(--orange); color: white; padding: 12px 10px; text-align: left; text-transform: uppercase; font-size: 13px; }
        tbody td { padding: 10px; border-bottom: 1px solid #ddd; font-size: 14px; color: #000; }
        .row-alt { background: rgba(243, 129, 24, 0.05); }

        .calc-wrapper { display: flex; justify-content: flex-end; margin-top: 20px; }
        .calc-table { width: 280px; }
        .calc-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 16px; }
        .grand-total-row { margin-top: 10px; font-size: 26px; font-weight: 900; color: var(--orange); border-top: 2px solid #000; padding-top: 5px; }

        /* ✅ PRINT RULES */
        @media print {
            body { background: none; }
            .no-print { display: none; }
            #bill-wrapper { overflow: visible; padding: 0; }
            #bill-canvas { width: 210mm; min-height: 297mm; box-shadow: none; margin: 0; }
        }

        /* Small screen adjustment for the dashboard */
        @media (max-width: 600px) {
            .no-print { margin: 10px; padding: 15px; }
            .info-box p, .infro-box p { font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <h2 style="color: var(--orange); text-align:center; margin-bottom:15px;">Cyclewala Billing Dashboard</h2>
    
    <div class="input-row">
        <input type="text" id="cName" placeholder="Customer Name" oninput="sync()">
        <input type="text" id="cPhone" placeholder="WhatsApp Number (e.g. 91...)" oninput="sync()">
    </div>

    <div class="input-row">
        <input type="text" id="iName" placeholder="Product Name">
        <input type="number" id="iQty" placeholder="Qty">
        <input type="number" id="iRate" placeholder="Rate">
        <button class="btn-main" onclick="addItem()">+ ADD PRODUCT TO BILL</button>
    </div>
    
    <div class="action-btns">
        <button class="btn-print" onclick="window.print()">PRINT / SAVE PDF</button>
        <button class="btn-whatsapp" onclick="sendWhatsApp()">SEND TO WHATSAPP</button>
    </div>
</div>

<div id="bill-wrapper">
    <div id="bill-canvas">
        <img src="./fheader.png" class="bill-header-img" alt="Header">

        <div class="bill-content">
            <div class="info-section">
                <div class="info-box">
                    <p><strong>123 Main Street</strong></p>
                    <p>City, State, ZIP Code</p>
                    <p>+91 98643 22260</p>
                    <p>info@cyclewala.com</p>
                </div>
                <div class="infro-box">
                    <p><strong>Invoice No: </strong> <span id="invNo"></span></p>
                    <p><strong>Date: </strong> <span id="dispDate"></span></p>
                    <hr class="bill-line">
                    <p style="margin-top:8px"><strong>To:</strong> <span id="dispName">Customer Name</span></p>
                    <p id="dispPhone">Phone: 7385590822</p>
                </div>
            </div>

            <div class="shop-title-bar">COMPLETE BICYCLE STORE</div>

            <table>
                <thead>
                    <tr>
                        <th style="width:50px">Sr.</th>
                        <th>Description</th>
                        <th style="width:60px">Qty</th>
                        <th>Rate</th>
                        <th>Amount</th>
                    </tr>
                </thead>
                <tbody id="billBody"></tbody>
            </table>

            <div class="calc-wrapper">
                <div class="calc-table">
                    <div class="calc-row"><span>SUBTOTAL</span> <span id="subT">₹0</span></div>
                    <div class="calc-row"><span>CGST (2.5%)</span> <span id="cgstT">₹0.00</span></div>
                    <div class="calc-row"><span>SGST (2.5%)</span> <span id="sgstT">₹0.00</span></div>
                    <div class="calc-row grand-total-row"><span>Total</span> <span id="grandT">₹0</span></div>
                </div>
            </div>
        </div>

        <div class="bill-footer-wrapper">
            <img src="./ffui.png" class="bill-footer-img" alt="Footer">
        </div>
    </div>
</div>

<script>
    let items = [];
    
    window.onload = function() {
        const randomBillNo = Math.floor(100000 + Math.random() * 900000);
        document.getElementById('invNo').innerText = randomBillNo;
        document.getElementById('dispDate').innerText = new Date().toLocaleDateString('en-GB');
    };

    function addItem() {
        const n = document.getElementById('iName').value;
        const q = parseFloat(document.getElementById('iQty').value);
        const r = parseFloat(document.getElementById('iRate').value);
        if (!n || isNaN(q) || isNaN(r)) {
            alert("कृपया सभी डिटेल्स भरें!");
            return;
        }
        items.push({ n, q, r, a: q * r });
        render();
        document.getElementById('iName').value = '';
        document.getElementById('iQty').value = '';
        document.getElementById('iRate').value = '';
    }

    function sync() {
        document.getElementById('dispName').innerText = document.getElementById('cName').value || "Customer Name";
        document.getElementById('dispPhone').innerText = "Phone: " + (document.getElementById('cPhone').value || "7385590822");
    }

    function render() {
        let html = '', sub = 0;
        items.forEach((it, i) => {
            sub += it.a;
            html += `<tr class="${i % 2 != 0 ? 'row-alt' : ''}">
                <td>${i + 1}</td><td>${it.n}</td><td>${it.q}</td>
                <td>₹${it.r.toLocaleString('en-IN')}</td><td>₹${it.a.toLocaleString('en-IN')}</td>
            </tr>`;
        });
        document.getElementById('billBody').innerHTML = html;
        
        let cgst = sub * 0.025;
        let sgst = sub * 0.025;
        let total = sub + cgst + sgst;

        document.getElementById('subT').innerText = "₹" + sub.toLocaleString('en-IN');
        document.getElementById('cgstT').innerText = "₹" + cgst.toLocaleString('en-IN', {minimumFractionDigits: 2});
        document.getElementById('sgstT').innerText = "₹" + sgst.toLocaleString('en-IN', {minimumFractionDigits: 2});
        document.getElementById('grandT').innerText = "₹" + Math.round(total).toLocaleString('en-IN');
    }

    function sendWhatsApp() {
        const phone = document.getElementById('cPhone').value;
        const name = document.getElementById('cName').value || "Customer";
        const invNo = document.getElementById('invNo').innerText;
        const total = document.getElementById('grandT').innerText;

        if(!phone) {
            alert("WhatsApp नंबर डालना जरूरी है!");
            return;
        }

        let productList = "";
        items.forEach((it, i) => {
            productList += `${i+1}. ${it.n} (Qty: ${it.q})%0A`;
        });

        const msg = `नमस्ते ${name},%0A%0A*Cyclewala* से खरीदारी के लिए धन्यवाद!%0A%0A*Invoice:* #${invNo}%0A*Items:*%0A${productList}%0A*Total: ${total}*%0A%0Aहम आपका PDF बिल अभी भेज रहे हैं।`;

        window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');

        setTimeout(() => {
            window.print();
        }, 1000);
    }
</script>
</body>
</html>
