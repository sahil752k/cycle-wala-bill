<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyclewala | Elite Nexus</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f9a825;
            --gold-glow: rgba(249, 168, 37, 0.3);
            --bg: #08080a;
            --card-bg: rgba(18, 18, 20, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            perspective: 1200px;
            padding: 20px;
        }

        /* Ambient Glow Background */
        .ambient-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 10%, rgba(249, 168, 37, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, rgba(249, 168, 37, 0.05) 0%, transparent 50%);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .logo-section {
            margin-bottom: 50px;
            text-align: center;
            animation: slideDown 1s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .main-logo {
            width: 100%;
            max-width: 380px;
            height: auto;
            filter: drop-shadow(0 15px 35px rgba(0,0,0,0.8));
        }

        /* Responsive Grid */
        .nexus-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            width: 100%;
        }

        /* 3D Glass Card */
        .nexus-card {
            position: relative;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 32px;
            padding: 50px 25px;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Hover States */
        .nexus-card:hover {
            transform: translateY(-15px) rotateX(8deg);
            border-color: var(--gold);
            box-shadow: 0 40px 80px rgba(0,0,0,0.7), 0 0 15px var(--gold-glow);
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            color: var(--gold);
            transition: 0.4s;
            transform: translateZ(40px);
        }

        .nexus-card:hover .icon-box {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 25px var(--gold);
            transform: translateZ(60px) scale(1.1);
        }

        .nexus-card h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transform: translateZ(30px);
        }

        .nexus-card p {
            font-size: 0.85rem;
            color: #94a3b8;
            line-height: 1.6;
            transform: translateZ(20px);
            max-width: 200px;
        }

        /* Status Light */
        .status-light {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 6px;
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--gold);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        /* Responsive Breakpoints */
        @media (max-width: 1024px) {
            .nexus-grid { gap: 15px; }
            .nexus-card { padding: 40px 20px; }
        }

        @media (max-width: 850px) {
            .nexus-grid {
                grid-template-columns: 1fr; /* Stack cards vertically */
                max-width: 450px;
                margin: 0 auto;
            }
            
            .nexus-card {
                padding: 35px 25px;
                flex-direction: row; /* Horizontal layout for mobile */
                text-align: left;
                justify-content: flex-start;
                gap: 20px;
            }

            .icon-box { margin-bottom: 0; width: 60px; height: 60px; }
            
            .nexus-card p { max-width: none; }
            
            .nexus-card:hover {
                transform: translateX(10px); /* Slide instead of tilt on mobile */
            }

            .main-logo { max-width: 300px; }
        }

        @media (max-width: 480px) {
            .main-logo { max-width: 240px; }
            .nexus-card h2 { font-size: 1.1rem; }
            .nexus-card p { font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>

    <div class="container">
        <div class="logo-section">
            <img src="logo.png" alt="Cyclewala" class="main-logo">
        </div>

        <div class="nexus-grid">
            <a href="./bill.html" class="nexus-card">
                <div class="status-light"></div>
                <div class="icon-box">
                    <i data-lucide="file-text" size="32"></i>
                </div>
                <div class="text-group">
                    <h2>Billing</h2>
                    <p>Terminal for premium A4 invoice execution.</p>
                </div>
            </a>

            <a href="./dashboard.html" class="nexus-card">
                <div class="status-light"></div>
                <div class="icon-box">
                    <i data-lucide="layout-dashboard" size="32"></i>
                </div>
                <div class="text-group">
                    <h2>Dashboard</h2>
                    <p>Real-time performance & sales monitoring.</p>
                </div>
            </a>

            <a href="https://docs.google.com/spreadsheets/d/1QkJkOSir4IO8PABtPLMnd4gDalTLYJT0yyDciNXFZLE/edit?gid=0#gid=0" target="_blank" class="nexus-card">
                <div class="status-light"></div>
                <div class="icon-box">
                    <i data-lucide="database" size="32"></i>
                </div>
                <div class="text-group">
                    <h2>Database</h2>
                    <p>Cloud-synced raw logs and master data.</p>
                </div>
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
