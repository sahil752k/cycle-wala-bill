<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cycle Wala Sales Dashboard - Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
  --primary: #f97316;
  --primary-hover: #ea580c;
  --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  --card-bg: rgba(255, 255, 255, 0.05);
  --glass: rgba(255, 255, 255, 0.03);
  --text-main: #f8fafc;
  --text-muted: #94a3b8;
  --radius: 16px;
}

/* 🔥 HOME BUTTON CSS */
.home-nav {
  position: absolute;
  top: 20px;
  left: 20px;
}

.btn-home {
  background: var(--glass);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-main);
  padding: 10px 18px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: 0.3s;
  backdrop-filter: blur(10px);
}

.btn-home:hover {
  background: var(--primary);
  border-color: var(--primary);
  transform: translateY(-2px);
}

/* 🔥 CUSTOM MODAL CSS */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(8px);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  animation: fadeIn 0.3s ease;
}

.modal-content {
  background: #1e293b;
  border: 1px solid rgba(255, 255, 255, 0.1);
  padding: 30px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  transform: scale(0.9);
  animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

.modal-icon { font-size: 50px; color: #ef4444; margin-bottom: 15px; }
.modal-btns { display: flex; gap: 12px; margin-top: 25px; justify-content: center; }
.btn-cancel { background: #334155 !important; }
.btn-confirm { background: #ef4444 !important; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes popIn { to { transform: scale(1); } }

/* 🔥 DELETE ROW ANIMATION */
@keyframes rowFadeOut {
  0% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(0.95); background: rgba(239, 68, 68, 0.2); }
}

.deleting-row { animation: rowFadeOut 0.4s ease forwards; pointer-events: none; }

* { box-sizing: border-box; }
body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-gradient); background-attachment: fixed; color: var(--text-main); min-height: 100vh; padding: 15px; position: relative; }
header { text-align: center; padding: 20px 0 30px; }
h1 { font-family: 'Poppins', sans-serif; font-size: clamp(1.5rem, 5vw, 2.2rem); margin: 0; background: linear-gradient(to right, #fff, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; max-width: 1300px; margin: 0 auto 30px; }
.card { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: var(--radius); border-left: 4px solid var(--primary); }
.card h3 { color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; margin: 0 0 10px; }
.card .amount { font-size: 1.6rem; font-weight: 700; display: block; }
.card .sales-count { font-size: 0.85rem; color: var(--primary); margin-top: 5px; font-weight: 500; }

.controls { max-width: 1300px; margin: 0 auto 30px; background: var(--glass); padding: 20px; border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; gap: 15px; }
.control-group { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: center; }

input[type="date"] { background: #0f172a; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 10px; border-radius: 8px; outline: none; }
button { padding: 10px 20px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
button:hover { background: var(--primary-hover); }

#dataBox { background: var(--glass); border-radius: var(--radius); padding: 15px; margin: 0 auto; max-width: 1300px; border: 1px solid rgba(255,255,255,0.05); overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 1100px; }
th { background: rgba(255,255,255,0.05); color: var(--text-muted); padding: 12px 8px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
td { padding: 10px 8px; border: 1px solid rgba(255,255,255,0.05); white-space: nowrap; }

.total-summary { display: flex; justify-content: flex-end; gap: 40px; margin-top: 20px; padding: 20px; background: rgba(249, 115, 22, 0.1); border-radius: 12px; border: 1px solid rgba(249, 115, 22, 0.2); }
.total-item { text-align: center; }
.total-item span { color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; display: block; margin-bottom: 5px; }
.total-item div { font-size: 1.4rem; font-weight: 700; color: var(--primary); }

@media (max-width: 768px) { 
  .home-nav { position: static; text-align: center; margin-bottom: 10px; display: flex; justify-content: center; }
  .controls { flex-direction: column; } 
}
</style>
</head>
<body>

<nav class="home-nav">
  <a href="index.html" class="btn-home">
    <i class="fa-solid fa-house"></i> Home
  </a>
</nav>

<div id="deleteModal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-icon"><i class="fa-solid fa-circle-exclamation"></i></div>
    <h2 style="margin:0; font-family:Poppins;">Are you sure?</h2>
    <p style="color:var(--text-muted); margin-top:10px;">This bill will be permanently deleted from the database.</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">No, Keep it</button>
      <button class="btn-confirm" id="confirmDelBtn">Yes, Delete</button>
    </div>
  </div>
</div>

<header>
  <h1><i class="fa-solid fa-bicycle"></i> Cycle Wala Sales Insight</h1>
  <p>Real-time analytics & full spreadsheet report</p>
</header>

<div class="cards">
  <div class="card"><h3>Today</h3><span class="amount" id="todayAmt">₹0</span><div class="sales-count" id="todayCount">0 Sales</div></div>
  <div class="card"><h3>Yesterday</h3><span class="amount" id="yesterdayAmt">₹0</span><div class="sales-count" id="yesterdayCount">0 Sales</div></div>
  <div class="card"><h3>This Week</h3><span class="amount" id="weekAmt">₹0</span><div class="sales-count" id="weekCount">0 Sales</div></div>
  <div class="card"><h3>This Month</h3><span class="amount" id="monthAmt">₹0</span><div class="sales-count" id="monthCount">0 Sales</div></div>
</div>

<div class="controls">
  <div class="control-group">
    <input type="date" id="dateInput">
    <button onclick="filterData()"><i class="fa-solid fa-magnifying-glass"></i> Filter</button>
  </div>
  <div class="control-group">
    <input type="date" id="fromDate"><span style="color:var(--text-muted)">to</span><input type="date" id="toDate">
    <button onclick="filterRange()"><i class="fa-solid fa-filter"></i> Run Range</button>
    <button onclick="loadData()" style="background:#334155"><i class="fa-solid fa-rotate"></i> Refresh</button>
  </div>
</div>

<div id="dataBox">
  <div style="text-align: center; padding: 40px; color: var(--text-muted);">
    <i class="fa-solid fa-table-list" style="font-size: 2.5rem; margin-bottom: 15px; opacity: 0.2;"></i>
    <h3>Select Date to View Full Spreadsheet Report</h3>
  </div>
</div>
<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwbq-qgIwWMnB4NeU9bAqt0PZKzTpgw7vJvDCKLB6z_X0lvd28ukF-Kr6nKBT0sWgNyXg/exec"; 
const SHEET_URL = "https://opensheet.elk.sh/1QkJkOSir4IO8PABtPLMnd4gDalTLYJT0yyDciNXFZLE/Sheet1";

let allData = [];
let pendingDeleteId = null;

// ✅ FILTER STATE (NEW)
let currentFilter = {
  type: "none",
  date: null,
  from: null,
  to: null
};

async function loadData() {
  try {
    const res = await fetch(SHEET_URL);
    allData = await res.json();

    calculateStats();

    // ✅ AUTO APPLY FILTER (WITHOUT BREAKING DESIGN)
    if (currentFilter.type !== "none") {
      applyFilter();
    }

  } catch (e) {
    console.error("Error", e);
  }
}

function formatDate(str) {
  if(!str) return "";
  let p = str.trim().split("/");
  return `${p[2]}-${p[1].padStart(2,"0")}-${p[0].padStart(2,"0")}`;
}

function calculateStats() {
  let now = new Date();
  let todayStr = now.toISOString().split('T')[0];
  let yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
  let yesterdayStr = yesterday.toISOString().split('T')[0];
  let curr = new Date();
  let first = curr.getDate() - curr.getDay() + 1;
  let weekStart = new Date(curr.setDate(first)); weekStart.setHours(0,0,0,0);
  let monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

  let stats = { t: {amt:0, c:0}, y: {amt:0, c:0}, w: {amt:0, c:0}, m: {amt:0, c:0} };

  allData.forEach(r => {
    let dStr = formatDate(r.Date);
    let dDate = new Date(dStr);
    let val = parseFloat(r["Grand Total"] || 0);
    if (dStr === todayStr) { stats.t.amt += val; stats.t.c++; }
    if (dStr === yesterdayStr) { stats.y.amt += val; stats.y.c++; }
    if (dDate >= weekStart && dDate <= now) { stats.w.amt += val; stats.w.c++; }
    if (dDate >= monthStart && dDate <= now) { stats.m.amt += val; stats.m.c++; }
  });

  updateCard("today", stats.t); 
  updateCard("yesterday", stats.y);
  updateCard("week", stats.w); 
  updateCard("month", stats.m);
}

function updateCard(id, data) {
  document.getElementById(id + "Amt").innerText = "₹" + data.amt.toLocaleString('en-IN');
  document.getElementById(id + "Count").innerText = data.c + " Sales Done";
}

// ✅ ORIGINAL DESIGN SAME (NO CHANGE)
function generateFullTable(data) {
  if(data.length === 0) return "<p style='text-align:center; padding:20px;'>No data found.</p>";
  let totalAmt = 0, totalQty = 0;

  let html = `<table><thead><tr>
  <th>Sr. No.</th><th>Date</th><th>Customer Name</th><th>Phone</th>
  <th>Product</th><th>Qty</th><th>Rate</th><th>Amount</th>
  <th>Subtotal</th><th>CGST</th><th>SGST</th><th>Grand Total</th><th>Action</th>
  </tr></thead><tbody>`;

  data.forEach((r, index) => {
    let gTotal = parseFloat(r["Grand Total"] || 0);
    let qty = parseInt(r.Qty || 0);
    totalAmt += gTotal;
    totalQty += qty;

    let invNo = r["Invoice No"] || index;

    html += `<tr class="row-${invNo}" data-qty="${qty}" data-total="${gTotal}">
      <td>${index + 1}</td>
      <td>${r.Date}</td>
      <td>${r["Customer Name"]}</td>
      <td>${r.Phone || '-'}</td>
      <td>${r.Product}</td>
      <td>${qty}</td>
      <td>₹${r.Rate}</td>
      <td>₹${r.Amount}</td>
      <td>₹${r.Subtotal || '-'}</td>
      <td>₹${r.CGST}</td>
      <td>₹${r.SGST}</td>
      <td style="font-weight:700; color:var(--primary)">₹${gTotal.toLocaleString('en-IN')}</td>
      <td>
        <button onclick="openDeleteModal('${invNo}')" style="background:#ef4444; color:white; border:none; padding:8px 12px; border-radius:6px;">
          Delete
        </button>
      </td>
    </tr>`;
  });

  html += `</tbody></table>
  <div class="total-summary">
    <div class="total-item"><span>Qty Total</span><div>${totalQty}</div></div>
    <div class="total-item"><span>Bills</span><div>${data.length}</div></div>
    <div class="total-item"><span>Grand Total</span><div>₹${totalAmt.toLocaleString('en-IN')}</div></div>
  </div>`;

  return html;
}

// ✅ APPLY FILTER (NEW)
function applyFilter() {
  let filtered = [];

  if (currentFilter.type === "single") {
    filtered = allData.filter(r => formatDate(r.Date) === currentFilter.date);
    document.getElementById("dataBox").innerHTML =
      `<h3>Report: ${currentFilter.date}</h3>` + generateFullTable(filtered);
  }

  else if (currentFilter.type === "range") {
    filtered = allData.filter(r => {
      let d = formatDate(r.Date);
      return d >= currentFilter.from && d <= currentFilter.to;
    });

    document.getElementById("dataBox").innerHTML =
      `<h3>Range: ${currentFilter.from} to ${currentFilter.to}</h3>` + generateFullTable(filtered);
  }
}

// ✅ FILTER BUTTON
function filterData() {
  let val = document.getElementById("dateInput").value;
  if(!val) return;

  currentFilter = {
    type: "single",
    date: val
  };

  applyFilter();
}

// ✅ RANGE FILTER
function filterRange() {
  let f = document.getElementById("fromDate").value;
  let t = document.getElementById("toDate").value;
  if(!f || !t) return;

  currentFilter = {
    type: "range",
    from: f,
    to: t
  };

  applyFilter();
}

// DELETE SAME
function openDeleteModal(invId) {
  pendingDeleteId = invId;
  executeDelete();
}

function executeDelete() {
  fetch(APPS_SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({ action: "delete", invoice: pendingDeleteId })
  });

  setTimeout(loadData, 2000);
}

// INIT
loadData();

// 🔥 AUTO REFRESH (10 sec - stable)
setInterval(loadData, 10000);
</script>




</body>
</html>
