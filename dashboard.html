<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cycle Wala Live Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <style>
    :root { --primary: #f97316; --bg: #0f172a; --card: rgba(255, 255, 255, 0.05); }
    body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; padding: 15px; margin: 0; }
    header { text-align: center; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .status { font-size: 0.8rem; color: #4ade80; margin-bottom: 10px; }
    .card { background: var(--card); padding: 20px; border-radius: 12px; border-left: 5px solid var(--primary); margin: 20px auto; max-width: 1200px; }
    .amount { font-size: 2rem; font-weight: bold; color: #fff; display: block; }
    #tableBox { max-width: 1200px; margin: 0 auto; overflow-x: auto; background: var(--card); border-radius: 12px; padding: 10px; }
    table { width: 100%; border-collapse: collapse; min-width: 800px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
    th { color: #94a3b8; text-transform: uppercase; font-size: 0.75rem; }
    .total-row { display: flex; justify-content: flex-end; padding: 20px; font-size: 1.3rem; font-weight: bold; color: var(--primary); }
  </style>
</head>
<body>

<header>
  <div class="status" id="syncLabel">● Initializing...</div>
  <h2 style="margin:0">Cycle Wala Sales Insight</h2>
</header>

<div class="card">
  Today's Real-time Sale
  <span class="amount" id="todayDisplay">₹0</span>
</div>

<div id="tableBox">
  <p style="text-align:center; padding:20px; color:#94a3b8;">Fetching data directly from Google Sheets...</p>
</div>

<script>
// configuration
const SHEET_ID = '1QkJkOSir4IO8PABtPLMnd4gDalTLYJT0yyDciNXFZLE';
const TAB_NAME = 'Sheet1';

// Load Google Charts
google.charts.load('current', {packages: ['corechart']});
google.charts.setOnLoadCallback(fetchSheetData);

async function fetchSheetData() {
    // Direct Google Query URL (No third party involved)
    const query = new google.visualization.Query(
        `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${TAB_NAME}`
    );

    query.send(handleQueryResponse);
}

function handleQueryResponse(response) {
    if (response.isError()) {
        document.getElementById('syncLabel').innerText = "⚠️ Error: Make sure Sheet is Public (Anyone with link)";
        document.getElementById('syncLabel').style.color = "#f87171";
        return;
    }

    const data = response.getDataTable();
    const rows = data.getNumberOfRows();
    const cols = data.getNumberOfColumns();
    
    // Get Column Headers
    let headers = [];
    for (let i = 0; i < cols; i++) {
        headers.push(data.getColumnLabel(i));
    }

    const today = new Date().toLocaleDateString('en-GB'); // Format: DD/MM/YYYY
    let todayTotal = 0;
    let tableHtml = `<table><thead><tr><th>Date</th><th>Customer</th><th>Product</th><th>Qty</th><th>Total</th></tr></thead><tbody>`;
    let foundAny = false;

    for (let i = 0; i < rows; i++) {
        let rowDate = data.getFormattedValue(i, 0); // Assuming Date is 1st column
        let customer = data.getValue(i, 2); // Customer Name
        let product = data.getValue(i, 4); // Product
        let qty = data.getValue(i, 5);     // Qty
        let total = data.getValue(i, 11);  // Grand Total (Assuming 12th column L)

        if (rowDate === today) {
            foundAny = true;
            let amt = parseFloat(String(total).replace(/[₹,]/g, '')) || 0;
            todayTotal += amt;

            tableHtml += `<tr>
                <td>${rowDate}</td>
                <td>${customer || '-'}</td>
                <td>${product || '-'}</td>
                <td>${qty || 0}</td>
                <td style="font-weight:bold; color:#f97316">₹${amt.toLocaleString('en-IN')}</td>
            </tr>`;
        }
    }

    tableHtml += `</tbody></table><div class="total-row">Total: ₹${todayTotal.toLocaleString('en-IN')}</div>`;
    
    document.getElementById('todayDisplay').innerText = "₹" + todayTotal.toLocaleString('en-IN');
    document.getElementById('tableBox').innerHTML = foundAny ? tableHtml : "<p style='text-align:center; padding:30px;'>No sales found for today yet.</p>";
    document.getElementById('syncLabel').innerText = "● Live Sync Active: " + new Date().toLocaleTimeString();
    document.getElementById('syncLabel').style.color = "#4ade80";
}

// 🔄 AUTO REFRESH EVERY 5 SECONDS
setInterval(fetchSheetData, 5000);
</script>

</body>
</html>
